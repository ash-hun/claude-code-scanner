appId: com.claude-code-scanner.app
productName: Claude Code Scanner
directories:
  output: release
files:
  - dist/**
  - scripts/init-db.sql
  - assets/**
  - node_modules/pg/**
mac:
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  artifactName: Claude-Code-Scanner-${version}-${arch}.${ext}
  target:
